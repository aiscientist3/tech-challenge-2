# Catálogo de dados — entidade: municipio
# Camada Bronze | Referência territorial de municípios (IBGE)
# Nota: distinta de br_inep_avaliacao_alfabetizacao.municipio (indicadores — ver municipio_indicadores)

version: "1.0"
status: completo

entity:
  id: municipio
  nome: Municípios
  nome_tecnico: municipio
  descricao: >
    Diretório de referência dos municípios brasileiros, com identificadores IBGE
    e de outros órgãos, hierarquia geográfica (regiões, microrregiões, etc.),
    vínculo com UF e centróide. Utilizado para enriquecimento territorial das
    entidades INEP na camada Silver.
  dominio_negocio: Metas INEP
  tipo: referencia
  granularidade: "1 linha por município"
  periodicidade: esporadica
  contem_dado_pessoal: false
  classificacao: Publica
  observacao: >
    Fonte br_bd_diretorios_brasil.municipio (Base dos Dados). Não confundir com
    br_inep_avaliacao_alfabetizacao.municipio, catalogada como municipio_indicadores.

governanca:
  data_owner:
    nome: AI Scientist
    email: aiscientist3@gmail.com
  data_stewards:
    - Samuel Porto
    - Walter Ferreira
    - Amanda Rarymi

origem:
  provedor: Base dos Dados
  sistema: Google BigQuery
  dataset: br_bd_diretorios_brasil
  tabela: municipio
  tabela_completa: basedosdados.br_bd_diretorios_brasil.municipio
  documentacao:
    - https://basedosdados.org/dataset/br-bd-diretorios-brasil-municipio

destino:
  camada: bronze
  formato: delta_lake
  particionamento: null
  caminho_relativo: bronze/br_inep_alfabetizacao/municipio/
  caminho_exemplo: s3://{bucket}/bronze/br_inep_alfabetizacao/municipio/

ingestao:
  pipeline: ingestion/batch/main.py
  source_code: ingestion/batch/sources/municipio.py
  filtro_ano: false
  modo_escrita: overwrite
  colunas_origem: SELECT *

chaves:
  candidata_negocio:
    - id_municipio
  estrangeiras_sugeridas:
    - coluna: id_uf
      referencia: uf.id_uf
      descricao: Vínculo com diretório de UFs
    - coluna: sigla_uf
      referencia: uf.sigla
      descricao: Vínculo alternativo com diretório de UFs

colunas:
  - nome: id_municipio
    tipo: STRING
    nullable: true
    descricao: ID Município - IBGE 7 Dígitos
    chave: true
    pii: false

  - nome: id_municipio_6
    tipo: STRING
    nullable: true
    descricao: ID Município - IBGE 6 Dígitos
    chave: false
    pii: false

  - nome: id_municipio_tse
    tipo: STRING
    nullable: true
    descricao: ID Município - Tribunal Superior Eleitoral (TSE)
    chave: false
    pii: false

  - nome: id_municipio_rf
    tipo: STRING
    nullable: true
    descricao: ID Município - Receita Federal (RF)
    chave: false
    pii: false

  - nome: id_municipio_bcb
    tipo: STRING
    nullable: true
    descricao: ID Município - Banco Central do Brasil (BCB)
