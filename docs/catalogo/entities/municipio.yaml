colunas_tecnicas_ingestao:
  - nome: _ingestion_timestamp
    tipo: STRING
    descricao: Data/hora UTC da ingestão (ISO 8601)
    origem: pipeline
  - nome: _source_table
    tipo: STRING
    descricao: Tabela de origem no BigQuery
    origem: pipeline
  - nome: _batch_id
    tipo: STRING
    descricao: UUID único do lote de ingestão
    origem: pipeline

qualidade:
  regras:
    - id: municipio_id_obrigatorio
      tipo: completude
      coluna: id_municipio
      descricao: Coluna id_municipio não deve ser nula
    - id: municipio_nome_obrigatorio
      tipo: completude
      coluna: nome
      descricao: Coluna nome não deve ser nula
    - id: municipio_id_unico
      tipo: unicidade
      coluna: id_municipio
      descricao: ID município IBGE único por carga
    - id: municipio_id_formato
      tipo: dominio
      coluna: id_municipio
      descricao: ID município com 7 dígitos numéricos
  status_implementacao: documentado

lineage:
  upstream:
    - basedosdados.br_bd_diretorios_brasil.municipio
  downstream_planejado:
    - silver.municipio
    - silver.meta_municipio
    - silver.alunos

contrato_dados:
  frequencia_carga: conforme agendamento Databricks Job
  sla_freshness: a_definir
