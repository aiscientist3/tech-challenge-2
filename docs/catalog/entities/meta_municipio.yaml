# Catálogo de dados — entidade: meta_municipio
# Camada Bronze | Metas e indicadores municipais de alfabetização

version: "1.0"
status: completo

entity:
  id: meta_municipio
  nome: Meta Alfabetização — Município
  nome_tecnico: meta_alfabetizacao_municipio
  descricao: >
    Indicadores e metas de alfabetização em nível municipal, segmentados por
    rede de ensino. Inclui taxa observada na avaliação, metas anuais de 2024
    a 2030, nível de alfabetização e percentual de participação no município.
  dominio_negocio: Metas INEP
  tipo: indicador
  granularidade: "1 linha por ano, município e rede de ensino"
  periodicidade: anual
  contem_dado_pessoal: false
  classificacao: Publica

governanca:
  data_owner:
    nome: AI Scientist
    email: aiscientist3@gmail.com
  data_stewards:
    - Samuel Porto
    - Walter Ferreira
    - Amanda Rarymi

origem:
  provedor: Base dos Dados
  sistema: Google BigQuery
  dataset: br_inep_avaliacao_alfabetizacao
  tabela: meta_alfabetizacao_municipio
  tabela_completa: basedosdados.br_inep_avaliacao_alfabetizacao.meta_alfabetizacao_municipio
  documentacao:
    - https://basedosdados.org/dataset/073a39d4-89cf-4068-b1e8-34ed0d9c0b72
    - https://www.gov.br/inep/pt-br/areas-de-atuacao/pesquisas-e-avaliacao/avaliacao-da-alfabetizacao

destino:
  camada: bronze
  formato: delta_lake
  particionamento:
    coluna: ano
    tipo: hive_style
  caminho_relativo: bronze/br_inep_alfabetizacao/meta_municipio/
  caminho_exemplo: s3://{bucket}/bronze/br_inep_alfabetizacao/meta_municipio/ano=2024/

ingestao:
  pipeline: ingestion/batch/main.py
  source_code: ingestion/batch/sources/meta_municipio.py
  filtro_ano: true
  modo_escrita: overwrite
  colunas_origem: SELECT *

chaves:
  candidata_negocio:
    - ano
    - id_municipio
    - rede
  estrangeiras_sugeridas:
    - coluna: id_municipio
      referencia: municipio.id_municipio
      descricao: Vínculo territorial do município

colunas:
  - nome: ano
    tipo: INTEGER
    nullable: true
    descricao: Ano da avaliação
    chave: true
    pii: false

  - nome: id_municipio
    tipo: STRING
    nullable: true
    descricao: ID município de 7 dígitos
    chave: true
    pii: false

  - nome: rede
    tipo: STRING
    nullable: true
    descricao: Rede de ensino
    chave: true
    pii: false

  - nome: taxa_alfabetizacao
    tipo: FLOAT
    nullable: true
    descricao: Taxa de alfabetização
    chave: false
    pii: false
    indicador_negocio: true

  - nome: meta_alfabetizacao_2024
    tipo: FLOAT
    nullable: true
    descricao: Meta de alfabetização no ano de 2024
    chave: false
    pii: false
    indicador_negocio: true

  - nome: meta_alfabetizacao_2025
    tipo: FLOAT
    nullable: true
    descricao: Meta de alfabetização no ano de 2025
    chave: false
    pii: false
    indicador_negocio: true

  - nome: meta_alfabetizacao_2026
    tipo: FLOAT
    nullable: true
    descricao: Meta de alfabetização no ano de 2026
    chave: false
    pii: false
    indicador_negocio: true

  - nome: meta_alfabetizacao_2027
    tipo: FLOAT
    nullable: true
    descricao: Meta de alfabetização no ano de 2027
    chave: false
    pii: false
    indicador_negocio: true

  - nome: meta_alfabetizacao_2028
    tipo: FLOAT
    nullable: true
    descricao: Meta de alfabetização no ano de 2028
    chave: false
    pii: false
    indicador_negocio: true

  - nome: meta_alfabetizacao_2029
    tipo: FLOAT
    nullable: true
    descricao: Meta de alfabetização no ano de 2029
    chave: false
    pii: false
    indicador_negocio: true

  - nome: meta_alfabetizacao_2030
    tipo: FLOAT
    nullable: true
    descricao: Meta de alfabetização no ano de 2030
    chave: false
    pii: false
    indicador_negocio: true

  - nome: nivel_alfabetizacao
    tipo: INTEGER
    nullable: true
    descricao: Nível de alfabetização
    chave: false
    pii: false
    indicador_negocio: true

  - nome: percentual_participacao
    tipo: FLOAT
    nullable: true
    descricao: Percentual de participação no município
    chave: false
    pii: false
    indicador_negocio: true

colunas_tecnicas_ingestao:
  - nome: _ingestion_timestamp
    tipo: STRING
    descricao: Data/hora UTC da ingestão (ISO 8601)
    origem: pipeline
  - nome: _source_table
    tipo: STRING
    descricao: Tabela de origem no BigQuery
    origem: pipeline
  - nome: _batch_id
    tipo: STRING
    descricao: UUID único do lote de ingestão
    origem: pipeline

qualidade:
  regras:
    - id: meta_municipio_ano_obrigatorio
      tipo: completude
      coluna: ano
      descricao: Coluna ano não deve ser nula
    - id: meta_municipio_chave_unica
      tipo: unicidade
      colunas: [ano, id_municipio, rede]
      descricao: Combinação ano + município + rede deve ser única por carga
    - id: meta_municipio_id_municipio_formato
      tipo: dominio
      coluna: id_municipio
      descricao: ID município com 7 dígitos numéricos
    - id: meta_municipio_taxas_faixa
      tipo: dominio
      descricao: Taxa de alfabetização, metas e percentual de participação entre 0 e 100
  status_implementacao: documentado

lineage:
  upstream:
    - basedosdados.br_inep_avaliacao_alfabetizacao.meta_alfabetizacao_municipio
  downstream_planejado:
    - silver.meta_municipio
    - gold.indicador_crianca_alfabetizada

contrato_dados:
  frequencia_carga: conforme agendamento Databricks Job
  anos_suportados: [2023, 2024]
  sla_freshness: a_definir
